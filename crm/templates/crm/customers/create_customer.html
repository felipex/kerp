{% extends 'base.html' %}

{% block content %}
<h1>Novo Cliente</h1>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
        <label class="form-label">
            {{ field.label_tag }}
        </label>
        {{ field }}
        {% if field.help_text %}
        <small class="form-text text-muted">{{ field.help_text }}</small>
        {% endif %}
        {% for error in field.errors %}
        <div class="text-danger">{{ error }}</div>
        {% endfor %}
    </div>
    {% endfor %}
    <button type="submit">Salvar</button>
</form>
{% endblock %}
