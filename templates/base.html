<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>ERP teste</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </style>
    <style>
        :root {
            --main-bg-color: var(--bs-body-bg);
            --header-bg-color: var(--bs-danger-bg-subtle);
            --sidebar-bg-color: var(--bs-danger-bg-subtle);
        }

        body {
            background-color: var(--header-bg-color);
        }

        h4 {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            color: var(--bs-tertiary-color);
        }

        input,
        select,
        textarea,
        button {
            font-family: 'Inter', sans-serif;
            /* Fonte desejada */
            font-size: 16px;
            /* Recomendado para evitar zoom automático no iOS */
        }

        aside {
            background-color: var(--sidebar-bg-color);
            float: left;
            width: 12%;
            height: 100%;
        }


        header {
            background-color: var(--header-bg-color);
            float: left;
            width: 100%;
            height: 8vh;
        }

        header .menu {
            float: left;
            width: 10%;
            margin-left: 1rem;
        }

        header .menu li {
            margin-top: 0.5rem;
            font-size: 1.2rem;
            font-family: 'Inter', sans-serif;

        }

        header .menu li a {
            color: var(--bs-tertiary-color);
            text-decoration: none;
        }




        header .user {
            float: right;
            margin-right: 10rem;
        }

        main {
            float: left;
            margin-left: 1rem;
            width: 96%;
            height: 90vh;
            padding: 1rem;
            background-color: var(--main-bg-color);
            border-radius: 1rem;
        }

        .icon_menu {
            color: var(--bs-tertiary-color);
        }
    </style>
</head>

<body>

    <div class="">
        <header class="">
            {% include 'partials/topbar.html' %}
        </header>

        <main id="main-content" class="">
            {% block content %}
            {% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>

</html>
